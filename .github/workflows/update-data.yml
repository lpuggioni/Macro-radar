name: Update Macro Radar Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Fetch data and write JSON
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python scripts/fetch_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "macro-radar-bot"
          git config user.email "macro-radar-bot@users.noreply.github.com"
          git add docs/data/*.json
          git diff --cached --quiet || (git commit -m "Update data" && git push)
